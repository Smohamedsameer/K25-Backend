# Activated only when SPRING_PROFILES_ACTIVE=prod is set (Railway env var).
# Your existing application.properties still runs everything locally, unchanged.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Railway injects PORT \u2014 your app must listen on whatever it assigns.
server.port=${PORT:8080}

app.admin.username=${APP_ADMIN_USERNAME}
app.admin.password=${APP_ADMIN_PASSWORD}
app.k25.max-users=${APP_K25_MAX_USERS:26}

# Path to the mounted persistent volume (set up in Step 5) \u2014 NOT a relative
# path, or uploaded screenshots vanish on every redeploy.
app.upload.dir=${APP_UPLOAD_DIR:/data/uploads}

# Your real Vercel domain \u2014 set as an env var so you don't have to touch
# code when you add a custom domain later.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB