# ---- MySQL connection (values come from env vars set on Railway/Render dashboard) ----
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ---- Schema handling in prod ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# ---- Host assigns the port dynamically ----
server.port=${PORT:8080}

# ---- Upload folder (use /tmp or a mounted volume - see note below) ----
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}

# ---- Admin login (set these as env vars on the host, never hardcode) ----
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}