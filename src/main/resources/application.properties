# =========================================================================
#  Single properties file for BOTH local dev and Railway production.
#  Every value below is: ${ENV_VAR_NAME:local-default}
#  - Locally: no env vars are set, so the local-default after the ":" is used.
#  - On Railway: set the env var with the same name, and it overrides the
#    local default automatically. This means the app can NEVER crash again
#    from a missing/blank SPRING_PROFILES_ACTIVE, because it no longer
#    depends on any profile-specific file to have the properties it needs.
# =========================================================================

# ---- Server port (Railway injects PORT automatically, do not set manually) ----
server.port=${PORT:8080}

# ---- Database driver (same everywhere) ----
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Database connection ----
# Locally: defaults to your local MySQL (edit the default below to match your
#          own local DB name/username/password, or better, set these as
#          env vars in your IDE run config / terminal so nothing is hardcoded).
# On Railway: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
#             SPRING_DATASOURCE_PASSWORD in the service's Variables tab,
#             pointing at your Railway MySQL plugin's connection details.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fund_raiser}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mohamed@12oct}

# ---- JPA / Hibernate ----
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=${SHOW_SQL:true}

# ---- File upload limits (same everywhere) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Business rules ----
app.k25.max-users=${K25_MAX_USERS:26}

# ---- CORS allowed origins (comma-separated) ----
# On Railway, set APP_CORS_ALLOWED_ORIGINS to your real Vercel domain, e.g.:
#   https://k25-funds.vercel.app,https://*.vercel.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Upload directory ----
# Locally: ./uploads (relative folder next to where you run the app)
# On Railway: set UPLOAD_DIR (Railway's filesystem is ephemeral - files here
#             are wiped on every redeploy/restart. For real persistence,
#             use Railway's Volumes feature or an external store like S3/Cloudinary.)
app.upload.dir=${UPLOAD_DIR:./uploads}

# ---- Admin login ----
# CHANGE the local defaults below to whatever you want for local testing.
# On Railway: set ADMIN_USERNAME and ADMIN_PASSWORD as env vars - never
#             leave real credentials as the hardcoded default in this file
#             since it's committed to a public GitHub repo.
app.admin.username=${ADMIN_USERNAME:sameer@gmail.com}
app.admin.password=${ADMIN_PASSWORD:Mohd@12oct}