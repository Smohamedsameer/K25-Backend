# ---- Active profile (overridden by SPRING_PROFILES_ACTIVE env var on host) ----
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ---- DB driver (same for all environments) ----
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA shared settings ----
spring.jpa.open-in-view=false

# ---- File upload limits (same everywhere) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Business rules (same everywhere) ----
app.k25.max-users=26

# ---- CORS allowed origins (comma-separated, overridden per environment/host) ----
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}